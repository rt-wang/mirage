<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Latent Canvas</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main id="stage" class="stage">
      <div class="window" id="window">
        <header class="titlebar" aria-hidden="true">
          <div class="dots">
            <span class="dot dot--red"></span>
            <span class="dot dot--yellow"></span>
            <span class="dot dot--green"></span>
          </div>
          <div class="title">LATENT CANVAS</div>
          <div class="meta">
            <span id="fps" class="meta__fps">— fps</span>
            <span id="status" class="meta__status">booting</span>
          </div>
        </header>

        <div class="canvas-wrap">
          <video id="video" playsinline muted autoplay aria-hidden="true"></video>
          <canvas id="output" class="output"></canvas>

          <div class="overlay overlay--top">
            <span class="badge" id="countBadge">0 objects</span>
            <span class="badge badge--title" id="planTitle">Neutral</span>
          </div>

          <div class="overlay overlay--bottom">
            <div class="controls">
              <div class="source-row">
                <button id="cameraBtn" class="source-btn is-active" type="button">Camera</button>
                <label class="source-btn" id="uploadLabel" for="videoUpload">Upload Video</label>
                <input type="file" id="videoUpload" accept="video/*" hidden>
                <span class="source-filename" id="sourceFilename"></span>
              </div>
              <div class="source-divider"></div>
              <div class="presets" role="tablist" aria-label="Action plan presets" id="presetRow"></div>
              <div class="bottom-row">
                <label class="intensity">
                  <span class="intensity__label">Intensity</span>
                  <input
                    type="range"
                    min="0"
                    max="100"
                    value="80"
                    step="1"
                    id="intensitySlider"
                    class="intensity__slider"
                    aria-label="Global intensity"
                  />
                  <span class="intensity__value" id="intensityValue">80</span>
                </label>
                <button id="feedToggle" class="feed-toggle" type="button" aria-pressed="false">Hide Feed</button>
              </div>
            </div>
          </div>

          <div id="boot" class="boot">
            <div class="boot__inner">
              <div class="boot__title">initializing vision</div>
              <div class="boot__step" id="bootStep">requesting camera…</div>
              <div class="boot__bar"><div class="boot__bar-fill" id="bootBar"></div></div>
            </div>
          </div>
        </div>
      </div>
    </main>

    <!-- TensorFlow.js + COCO-SSD (object detection) -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.20.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.3/dist/coco-ssd.min.js"></script>
    <!-- OpenCV.js (object-local CV: edges + lines inside each bbox) -->
    <script async src="https://docs.opencv.org/4.x/opencv.js" onload="window.__cvReady=true"></script>

    <script type="module" src="./app.js"></script>
  </body>
</html>
